apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  resource.customizations.health.PersistentVolumeClaim: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.phase == "Pending" then
        hs.status = "Healthy"
        hs.message = "PVC pending - waiting for first consumer"
        return hs
      end
      if obj.status.phase == "Bound" then
        hs.status = "Healthy"
        hs.message = "PVC bound"
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for PVC"
    return hs
 