apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-app-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "https://github.com/gitsohel1030/eks-devops-gitops.git"
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: "https://kubernetes.default.svc"
    namespace: prod-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true