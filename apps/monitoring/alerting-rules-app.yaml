apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerting-rules
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/gitsohel1030/eks-devops-gitops.git
    targetRevision: main
    path: k8s/monitoring/rules

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true