fullnameOverride: prometheus-stack

#------------PROMETHEUS---------------------------------------------------------------------------------

prometheus:
  prometheusSpec:
    retention: 7d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 200m
        memory: 400Mi
      limits: 
        cpu: 500m
        memory: 600Mi

#-------------GRAFANA-----------------------------------------------------------------------------------------

grafana:
  enabled: true
  adminPassword: "devops123"

  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits: 
      cpu: 200m
      memory: 200Mi

  ingress: 
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip

  persistence:
    enabled: false #true - temp disabled
    storageClassName: gp3
    size: 5Gi

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.logging.svc.cluster.local
      access: proxy
      isDefault: false

#-------------------AlertManager-------------------------------------------------

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    storage: 
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
    
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s  # wait 30s before sending first alert in a group
      group_interval: 5m # wait 5m before sedning new alerts for same froup
      repeat_interval: 12h  # resend alert if still firing after 12h
      receiver: slack-notifications

      routes: 
        - matchers:
            - severity="critical"
          receiver: slack-notifications
          repeat_interval: 1h

        - matchers:
            - severity="warning"
          receiver: slack-notifications
          repeat_interval: 6h

    receivers:
    - name: slack-notifications
      slack_configs:
        - channel: '#devops-alerts'
          send_resolved: true
          title: '{{ if eq .Status "firing" }} FIRING{{ else }} RESOLVED{{ end }} — {{ .CommonLabels.alertname }}'
          text: '{{ range .Alerts }}*Severity:* {{ .Labels.severity }} | *Namespace:* {{ .Labels.namespace }} | *Description:* {{ .Annotations.description }}{{ end }}'
 

    inhibit_rules:
      # If critical alert is firing, suppress warning for same issue
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace']

  # Mount the k8s secret containing webhook URL
  # this keeps the url of Git completely 
    secrets:
      - alertmanager-slack-webhook           

#----------------------------NODE EXPORTER----------------------------------------------------

nodeExporter:
  enabled: true

#-------------------------------kube-state-metrics---------------------------------------------------

kubeStateMetrics:
  enabled: true

#------------------------- Disable EKS Managed Control Plane Components--------------------------

kubeEtcd:
  enabled: false
kubeControllerManager:
  eabled: false
kubeScheduler:
  enabled: false