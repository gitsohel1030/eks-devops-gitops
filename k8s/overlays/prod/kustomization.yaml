apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod-app

resources:
  - ../../base
  - namespace.yaml
  - configmap.yaml
  - hpa-blue.yaml
  - hpa-green.yaml
  - pdb-blue.yaml
  - pdb-green.yaml


labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: web-app


patches:
  - path: patch-blue-image.yaml    
    target:
      kind: Deployment
      name: web-app-blue

  - path: traffic/traffic-blue-100.yaml
    target:
      kind: Ingress
      name: web-app-ingress
